name: Desktop CI

on:
  pull_request:
    paths:
      - "app/**"
      - "scripts/**"
      - "README.md"
      - ".github/workflows/deploy-wails.yml"
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "scripts/**"
      - "README.md"
      - ".github/workflows/deploy-wails.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
          - os: macos-latest
            platform: darwin/universal

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod
          cache-dependency-path: app/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Build frontend
        working-directory: app/frontend
        run: npm run build

      - name: Test Go code
        working-directory: app
        run: go test -count=1 ./...

      - name: Vet Go code
        working-directory: app
        run: go vet ./...

      - name: Install pinned Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Build desktop application
        working-directory: app
        run: wails build -clean -nosyncgomod -platform ${{ matrix.platform }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ runner.os }}
          path: app/build/bin/*
          if-no-files-found: error
