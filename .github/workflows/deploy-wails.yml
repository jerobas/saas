name: Desktop CI

on:
  pull_request:
    paths:
      - "app/**"
      - "scripts/**"
      - ".node-version"
      - "README.md"
      - ".github/workflows/deploy-wails.yml"
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "scripts/**"
      - ".node-version"
      - "README.md"
      - ".github/workflows/deploy-wails.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.5
          cache-dependency-path: app/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Set up pinned npm
        run: npm install --global npm@11.13.0

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Download Go dependencies
        working-directory: app
        run: go mod download

      - name: Run offline desktop checks
        shell: pwsh
        run: .\scripts\check-desktop.ps1 -SkipDesktopBuild

      - name: Audit desktop dependencies
        shell: pwsh
        run: .\scripts\audit-desktop.ps1

  browser-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Set up pinned npm
        run: npm install --global npm@11.13.0

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Install Chromium
        working-directory: app/frontend
        run: npx --no-install playwright install --with-deps chromium

      - name: Run browser smoke test
        working-directory: app/frontend
        run: npm run test:e2e

  race:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.5
          cache-dependency-path: app/go.sum

      - name: Run Go tests with the race detector
        working-directory: app
        run: go test -race -shuffle=on -count=1 $(go list ./... | grep -v '/frontend/')

  build:
    needs: [quality, browser-smoke, race]

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
          - os: macos-latest
            platform: darwin/universal

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.5
          cache-dependency-path: app/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - name: Set up pinned npm
        run: npm install --global npm@11.13.0

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Build desktop application
        working-directory: app
        run: go tool wails build -clean -m -nosyncgomod -platform ${{ matrix.platform }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-${{ runner.os }}
          path: app/build/bin/*
          if-no-files-found: error
